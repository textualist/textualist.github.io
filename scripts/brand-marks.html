<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Mark Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400;1,8..60,500;1,8..60,600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e0b09;
    --paper: #f5f0e8;
    --red: #c41a1a;
    --muted: #2e2a26;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Source Sans 3', system-ui, sans-serif;
    --mono: 'DM Mono', 'SF Mono', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #ede4d4;
      --paper: #1a1510;
      --red: #d44030;
      --muted: #b5a898;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: transparent;
    padding: 2rem;
  }

  .mark {
    display: table;
    background: transparent;
    padding: 1.5em;
    line-height: 1;
    margin-bottom: 1rem;
    text-align: center;
  }
</style>
</head>
<body>

  <!-- Display mark -->
  <div class="mark" id="display">
    <span style="font-family:var(--mono);font-size:3.5rem;font-weight:400;letter-spacing:0.04em;-webkit-text-stroke:1.5px var(--ink);color:transparent">textualist<span style="color:rgba(196,26,26,0.25);-webkit-text-stroke-color:var(--red)">*</span></span>
  </div>

  <!-- Nav mark -->
  <div class="mark" id="nav">
    <span style="font-family:var(--mono);font-size:1rem;font-weight:400;color:var(--muted)">text<span style="color:var(--red)">*</span></span>
  </div>

  <!-- Project full names -->
  <div class="mark" id="name-gutenbit">
    <span style="font-family:var(--serif);font-size:1.25rem;font-weight:400;font-style:italic;color:var(--red)">gutenbit</span>
  </div>

  <div class="mark" id="name-literary-agent">
    <span style="font-family:var(--serif);font-size:1.25rem;font-weight:400;font-style:italic;color:var(--red)">literary agent</span>
  </div>

  <div class="mark" id="name-marginalia">
    <span style="font-family:var(--serif);font-size:1.25rem;font-weight:400;font-style:italic;color:var(--red)">marginalia</span>
  </div>

  <div class="mark" id="name-style-guide">
    <span style="font-family:var(--serif);font-size:1.25rem;font-weight:400;font-style:italic;color:var(--red)">style guide</span>
  </div>

  <!-- Project abbreviations -->
  <div class="mark" id="abbr-gb">
    <span style="font-family:var(--mono);font-size:1rem;color:var(--muted)">gb<span style="color:var(--red)">*</span></span>
  </div>

  <div class="mark" id="abbr-la">
    <span style="font-family:var(--mono);font-size:1rem;color:var(--muted)">la<span style="color:var(--red)">*</span></span>
  </div>

  <div class="mark" id="abbr-mg">
    <span style="font-family:var(--mono);font-size:1rem;color:var(--muted)">mg<span style="color:var(--red)">*</span></span>
  </div>

  <div class="mark" id="abbr-style">
    <span style="font-family:var(--mono);font-size:1rem;color:var(--muted)">style<span style="color:var(--red)">*</span></span>
  </div>

  <!-- Breadcrumbs -->
  <div class="mark" id="breadcrumb-gutenbit">
    <span style="font-family:var(--mono);font-size:1rem;color:var(--muted)">text<span style="color:var(--red)">*</span></span>
    <span style="font-family:var(--sans);font-size:1rem;color:var(--muted);opacity:0.4"> / </span>
    <span style="font-family:var(--serif);font-size:1rem;font-weight:400;font-style:italic;color:var(--red)">gutenbit</span>
  </div>

  <div class="mark" id="breadcrumb-gb">
    <span style="font-family:var(--mono);font-size:1rem;color:var(--muted)">text<span style="color:var(--red)">*</span></span>
    <span style="font-family:var(--sans);font-size:1rem;color:var(--muted);opacity:0.4"> / </span>
    <span style="font-family:var(--mono);font-size:1rem;color:var(--muted)">gb<span style="color:var(--red)">*</span></span>
  </div>

  <!-- Asterisk ornaments -->
  <div class="mark" id="asterisk-lg">
    <span style="font-family:var(--mono);font-size:3.5rem;color:rgba(196,26,26,0.25);-webkit-text-stroke:1.5px var(--red);letter-spacing:0.04em">*</span>
  </div>

  <div class="mark" id="asterisk-md">
    <span style="font-family:var(--mono);font-size:1.4rem;color:rgba(196,26,26,0.25);-webkit-text-stroke:0.8px var(--red)">*</span>
  </div>

  <div class="mark" id="asterisk-sm">
    <span style="font-family:var(--mono);font-size:1rem;color:rgba(196,26,26,0.25);-webkit-text-stroke:0.6px var(--red)">*</span>
  </div>

</body>
</html>
